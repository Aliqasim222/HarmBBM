experiment:
  dataset: pathmnist
  epochs: 150
  seeds: [42, 123, 2026]
  batch_size: 64
  num_workers: 2
  data_dir: ./data
  output_dir: ./results
  download: true
  deterministic: true
  augmentation: true
  dropout: 0.0
  label_smoothing: 0.1
  decay_epochs: [60, 120]
  decay_factor: 0.1
  optimizers: [sgdm, adam, adabelief, bbbound, harmbbm]

search:
  enabled: false
  tune_seed: 42
  epochs: 30
  budget: 50

optimizers:
  sgdm:
    lr: 0.01
    momentum: 0.9
    nesterov: false
    weight_decay: 0.001
  adam:
    lr: 0.0003
    beta1: 0.9
    beta2: 0.999
    eps: 1.0e-8
    weight_decay: 0.001
  adabelief:
    lr: 0.0003
    beta1: 0.9
    beta2: 0.999
    eps: 1.0e-8
    weight_decay: 0.001
  bbbound:
    lr: 0.1
    beta1: auto
    beta2: 0.999
    min_lr: 1.0e-8
    max_lr: 1.0
    eps: 1.0e-12
    weight_decay: 0.001
  harmbbm:
    lr: 0.01
    momentum: 0.9
    q_max: 0.9
    min_lr: 1.0e-6
    max_lr: 0.2
    eps: 1.0e-12
    weight_decay: 0.001
